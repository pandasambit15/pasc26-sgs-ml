# ============================================================
# PASC '26 Experiments Configuration
# Physics-Aware Multi-Task Learning for Atmospheric Turbulence Parameterization
# ============================================================

# --- Data Paths ---
data:
  data_dir: "/path/to/processed/numpy_data"   # Directory with features.npy, visc_coeff.npy, etc.
  scaler_dir: "/path/to/scalers"              # Directory with *.pkl scaler files
  train_split: 0.7
  val_split: 0.1
  seed: 42

# --- Model ---
model:
  n_features: 54
  # For ResMLP
  embed_size: 256
  num_blocks: 4
  # For TabTransformer
  num_heads: 4
  num_layers: 4
  dropout: 0.3

# --- Training ---
training:
  learning_rate: 1.0e-3
  weight_decay: 0.3
  batch_size: 8192
  max_epochs: 300
  early_stopping_patience: 20
  scheduler: "cosine"           # cosine | plateau

# --- Task Weighting ---
task_weighting:
  methods: ["Manual", "Uncertainty", "DWA"]
  n_seeds: 3
  seeds: [42, 123, 456]
  gradnorm_alpha: 1.5           # GradNorm balancing hyperparameter
  dwa_temperature: 2.0          # DWA temperature parameter

# --- L2 Regularization Ablation ---
l2_ablation:
  weight_decay_values: [0.0, 0.001, 0.01, 0.1, 0.3, 1.0]
  architectures: ["MLP", "ResMLP", "TabTransformer"]

# --- Evaluation ---
evaluation:
  active_turbulence_threshold: 0.01   # Coefficient threshold for active turbulence mask
  k_min: 0
  k_max: 219                          # ARM vertical levels (0-219); use 98 for RCE
  k_levels: [10, 50, 100, 150, 200]   # Levels for 2D slice visualisation only

# --- Output ---
output:
  results_dir: "./results"
  checkpoint_dir: "./checkpoints"
  figures_dir: "./figures"
